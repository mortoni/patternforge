# Publish Storybook to Chromatic when docs / stories / Storybook config change.
# Repo: add GitHub Actions secret CHROMATIC_PROJECT_TOKEN (Chromatic → Manage → Configure → Project token).
# Do not commit project tokens; rotate any token that was pasted in chat or logs.
#
# In-app documentation links use Chromatic branch permalinks (see CHROMATIC_APP_ID in src/lib/constants.ts),
# e.g. https://main--{appId}.chromatic.com — stable across builds; no URL updates after each publish.
name: Deploy Storybook

on:
  push:
    branches: [main]
    paths:
      - ".storybook/**"
      - "src/stories/**"
      - "src/**/*.mdx"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: storybook-chromatic
  cancel-in-progress: false

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to Chromatic
        id: chromatic
        uses: chromaui/action@v16.10.1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: build-storybook
          # Finish after upload so CI passes while Chromatic runs visual tests in the product UI.
          exitOnceUploaded: true
          # Optional: enable TurboSnap for faster runs on Storybook 7+ / Vite
          # onlyChanged: true

      - name: Log stable documentation URL
        run: |
          echo "Branch permalink (used by the app): https://main--${CHROMATIC_APP_ID}.chromatic.com/?path=/docs/introduction--docs"
          echo "Chromatic action storybookUrl: ${{ steps.chromatic.outputs.storybookUrl }}"
        env:
          CHROMATIC_APP_ID: 6a09a2c2e687bd342f4777e5
